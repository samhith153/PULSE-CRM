<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset</title>
  </head>
  <body style="margin:0;background:#f4f6fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f6fb;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(15,23,42,0.08);">
            <tr>
              <td style="background:linear-gradient(135deg,#0f172a,#1e293b);padding:28px 32px;color:#ffffff;">
                <div style="font-size:12px;letter-spacing:.16em;text-transform:uppercase;opacity:.85;">KALNET PULSE CRM</div>
                <h1 style="margin:10px 0 0;font-size:30px;line-height:1.2;">Reset your password</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:32px;">
                <p style="font-size:16px;line-height:1.6;margin:0 0 18px;">Hi $user_name,</p>
                <p style="font-size:16px;line-height:1.6;margin:0 0 18px;">We received a request to reset your password. Use the button below to set a new one.</p>
                <p style="text-align:center;margin:28px 0;">
                  <a href="$reset_url" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;padding:14px 24px;border-radius:999px;font-weight:700;">Reset password</a>
                </p>
                <p style="font-size:14px;line-height:1.6;margin:0 0 10px;color:#4b5563;">This link expires in $expires_minutes minutes.</p>
                <p style="font-size:14px;line-height:1.6;margin:0;color:#6b7280;">If you did not request a reset, you can ignore this message safely.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
