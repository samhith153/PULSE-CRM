# ─────────────────────────────────────────────────────────────────────────────
# Alembic configuration
# The actual DATABASE_URL is injected by alembic/env.py from app.core.config
# so the sqlalchemy.url below is just a placeholder that gets overridden.
# ─────────────────────────────────────────────────────────────────────────────
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Overridden at runtime in env.py — do not change this line
sqlalchemy.url = postgresql+asyncpg://placeholder/placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
